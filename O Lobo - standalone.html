document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-style:italic; color:#8f867a;\">sem enrolação.<\u002Fem>\n        <\u002Fh1>\n        <p style=\"font-family:'Newsreader',serif; font-size:19px; line-height:1.6; color:#c9c0ae; max-width:520px; margin:30px auto 0;\">\n          A newsletter semanal de investimentos no mercado americano que o brasileiro estava esperando. Sem jargão. Sem ruído. Só o que importa.\n        <\u002Fp>\n\n        <div style=\"max-width:480px; margin:40px auto 0;\">\n          <sc-if value=\"{{ subscribed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#1f2b22; border:1px solid var(--accent,#2f9d5b); padding:18px 22px; color:#cfe8d8; font-size:14px;\">\n              ✓ Pronto! Te enviei um email pra confirmar a inscrição.\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notSubscribed }}\" hint-placeholder-val=\"{{ true }}\">\n            <form onsubmit=\"{{ subscribe }}\" style=\"display:flex; gap:10px;\">\n              <input value=\"{{ email }}\" onchange=\"{{ setEmail }}\" type=\"email\" placeholder=\"seu@email.com\" style=\"flex:1; background:#efe8da; border:none; padding:15px 16px; font-family:'Archivo',sans-serif; font-size:14px; color:#1c1a17; outline:none;\">\n              <button type=\"submit\" style=\"background:var(--accent,#2f9d5b); color:#fff; border:none; cursor:pointer; font-family:'Archivo',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.12em; padding:15px 22px; white-space:nowrap;\">ASSINAR GRÁTIS<\u002Fbutton>\n            <\u002Fform>\n          <\u002Fsc-if>\n          <p style=\"font-size:11px; letter-spacing:0.06em; color:#6f665a; margin-top:14px;\">Grátis. Toda quinta-feira. Cancele quando quiser.<\u002Fp>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ showSocialProof }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:64px; padding-top:30px; border-top:1px solid #2a2820;\">\n          <p style=\"font-size:10px; letter-spacing:0.26em; color:#6f665a;\">JÁ LERAM ESTA op:4px; line-height:1.5;\">Cada edição: 1 tema central, os mercados da semana, 1 empresa dissecada, 1 conceito explicado.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:16px;\">\n              <span style=\"color:var(--accent,#2f9d5b); font-size:18px; line-height:1.4;\">✓<\u002Fspan>\n              <div>\n                <p style=\"font-family:'Newsreader',serif; font-size:20px; font-weight:600;\">Independente<\u002Fp>\n                <p style=\"font-family:'Newsreader',serif; font-size:16px; color:#6f665a; margin-top:4px; line-height:1.5;\">Sem corretora, sem anúncio, sem comissão.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- QUOTE -->\n    <section style=\"padding:24px 32px 96px;\">\n      <div style=\"max-width:820px; margin:0 auto; text-align:center;\">\n        <p style=\"font-family:'DM Serif Display',serif; font-style:italic; font-size:clamp(28px,4.6vw,46px); line-height:1.18; color:#1c1a17;\">\n          “Finalmente uma newsletter que não me trata como idiota.”\n        <\u002Fp>\n        <p style=\"font-size:11px; letter-spacing:0.2em; color:#8a8071; margin-top:28px;\">— RAFAEL M., LEITOR DESDE A EDIÇÃO #001<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ÚLTIMA EDIÇÃO -->\n    <section id=\"edicoes\" style=\"padding:24px 32px 40px; scroll-margin-top:90px;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <p style=\"text-align:center; font-size:11px; letter-spacing:0.28em; color:#8a8071; margin-bottom:40px;\">ÚLTIMA EDIÇÃO<\u002Fp>\n        <button onclick=\"{{ openLatest }}\" style=\"display:block; width:100%; text-align:left; cursor:pointer; background:#161616; color:#efe8da; border:none; padding:48px clamp(28px,5vw,64px); position:relative;\">\n          <div style=\"display:flex; gap:16px; align-items:center; font-size:10px; letter-spacing:0.2em; color:#8a8071; margin-bottom:28px;\">\n            <span style=\"color:#efe8da; font-weight:600;\">EDIÇÃO {{ latest.label }}<\u002Fspan>\n            <span>·<\u002Fspan><span>{{ latest.date }}<\u002Fspan>\n            <span>·<\u002Fspan><span>{{ latest.read }} DE LEITURA<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'DM Serif Display',serif; font-weight:400; font-size:clamp(28px,4.4vw,46px); line-height:1.08; max-width:760px;\">{{ latest.title }}<\u002Fh2>\n          <p style=\"font-family:'Newsreader',serif; font-size:18px; line-height:1.6; color:#b8ad97; max-width:620px; margin-top:24px;\">{{ latest.excerpt }}<\u002Fp>\n          <span style=\"display:inline-block; margin-top:32px; font-size:12px; font-weight:600; letter-spacing:0.14em; color:var(--accent,#2f9d5b);\">LER EDIÇÃO COMPLETA →<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TODAS AS EDIÇÕES -->\n    <section id=\"todas\" style=\"padding:56px 32px 96px; scroll-margin-top:90px;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:36px;\">\n          <p style=\"font-size:11px; letter-spacing:0.28em; color:#8a8071;\">TODAS AS EDIÇÕES<\u002Fp>\n          <span style=\"font-size:11px; letter-spacing:0.16em; color:#6f665a;\">{{ editionCountLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"{{ gridStyle }}\">\n          <sc-for list=\"{{ editions }}\" as=\"ed\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ ed.open }}\" style=\"text-align:left; cursor:pointer; background:none; border:1px solid #d2c9b7; padding:30px 30px 26px; display:flex; flex-direction:column; min-height:200px;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;\">\n                <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; background:#1c1a17; color:#efe8da; padding:4px 9px;\">{{ ed.label }}<\u002Fspan>\n                <span style=\"font-size:10px; letter-spacing:0.16em; color:#8a8071;\">{{ ed.date }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-family:'Newsreader',serif; font-weight:600; font-size:19px; line-height:1.32; color:#1c1a17; flex:1;\">{{ ed.cardTitle }}<\u002Fp>\n              <span style=\"margin-top:24px; font-size:12px; font-weight:600; letter-spacing:0.12em; color:#1c1a17;\">LER →<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CTA -->\n    <section id=\"assinar\" style=\"background:#161616; color:#efe8da; padding:96px 32px; scroll-margin-top:0;\">\n      <div style=\"max-width:620px; margin:0 auto; text-align:center;\">\n        <p style=\"font-family:'DM Serif Display',serif; font-style:italic; font-size:clamp(30px,5vw,52px); line-height:1.1; color:#8f867a;\">de graça, na sua caixa.<\u002Fp>\n        <p style=\"font-family:'Newsreader',serif; font-size:18px; line-height:1.6; color:#c9c0ae; margin-top:22px;\">Junte-se a mais de {{ subCountLabel }} brasileiros que acompanham Wall Street com O Lobo.<\u002Fp>\n        <div style=\"max-width:460px; margin:36px auto 0;\">\n          <sc-if value=\"{{ subscribed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#1f2b22; border:1px solid var(--accent,#2f9d5b); padding:18px 22px; color:#cfe8d8; font-size:14px;\">\n              ✓ Você já está na lista. Até quinta!\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notSubscribed }}\" hint-placeholder-val=\"{{ true }}\">\n            <form onsubmit=\"{{ subscribe }}\" style=\"display:flex; gap:10px;\">\n              <input value=\"{{ email }}\" onchange=\"{{ setEmail }}\" type=\"email\" placeholder=\"seu@email.com\" style=\"flex:1; background:#efe8da; border:none; padding:15px 16px; font-family:'Archivo',sans-serif; font-size:14px; color:#1c1a17; outline:none;\">\n              <button type=\"submit\" style=\"background:var(--accent,#2f9d5b); color:#fff; border:none; cursor:pointer; font-family:'Archivo',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.12em; padding:15px 22px; white-space:nowrap;\">ASSINAR GRÁTIS<\u002Fbutton>\n            <\u002Fform>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SOBRE O LOBO -->\n    <section id=\"sobre\" style=\"padding:96px 32px; scroll-margin-top:70px;\">\n      <div style=\"max-width:680px; margin:0 auto;\">\n        <p style=\"text-align:center; font-size:11px; letter-spacing:0.28em; color:#8a8071; margin-bottom:48px;\">SOBRE O LOBO<\u002Fp>\n        <div style=\"font-family:'Newsreader',serif; font-size:19px; line-height:1.72; color:#33302a; display:flex; flex-direction:column; gap:26px;\">\n          <p>O Lobo nasceu porque a gente cansou de economês. Cansou do jargão que só serve para afastar o investidor comum e parecer mais inteligente do que é.<\u002Fp>\n          <p>Wall Street não precisa ser um bicho de sete cabeças. No fundo, é só um bando de gente tentando descobrir o que vai acontecer amanhã antes dos outros.<\u002Fp>\n          <p style=\"font-family:'DM Serif Display',serif; font-style:normal; font-size:22px; line-height:1.4; border:1px solid #1c1a17; padding:28px 30px; color:#1c1a17;\">\n            O Lobo não é corretora. Não tem produto pra vender. Não recebe comissão de ninguém. Quando a gente indica alguma coisa, é porque faz sentido — não porque pagaram pra isso.\n          <\u002Fp>\n          <p>Toda quinta-feira a gente disseca o que aconteceu de mais importante no mercado americano. Sem ruído, sem enrolação. Só o que importa pro seu dinheiro.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ READING VIEW ============ -->\n  <sc-if value=\"{{ isReading }}\" hint-placeholder-val=\"{{ false }}\">\n  <main style=\"animation:fadeUp 0.4s ease;\">\n    <article style=\"max-width:680px; margin:0 auto; padding:56px 32px 40px;\">\n      <button onclick=\"{{ goEdicoes }}\" style=\"background:none; border:none; cursor:pointer; font-family:'Archivo',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.12em; color:#8a8071; margin-bottom:44px;\">← TODAS AS EDIÇÕES<\u002Fbutton>\n      <div style=\"display:flex; gap:14px; align-items:center; font-size:10px; letter-spacing:0.18em; color:#8a8071; margin-bottom:24px;\">\n        <span style=\"background:#1c1a17; color:#efe8da; padding:4px 9px; font-weight:700;\">EDIÇÃO {{ selected.label }}<\u002Fspan>\n        <span>{{ selected.date }}<\u002Fspan><span>·<\u002Fspan><span>{{ selected.read }} DE LEITURA<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'DM Serif Display',serif; font-weight:400; font-size:clamp(32px,5.2vw,52px); line-height:1.06; color:#1c1a17;\">{{ selected.title }}<\u002Fh1>\n      <div style=\"height:1px; background:#d2c9b7; margin:40px 0;\"><\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:8px;\">\n        <sc-for list=\"{{ selected.body }}\" as=\"block\" hint-placeholder-count=\"5\">\n          <sc-if value=\"{{ block.isH }}\" hint-placeholder-val=\"{{ false }}\">\n            <h2 style=\"font-family:'DM Serif Display',serif; font-weight:400; font-size:27px; line-height:1.2; color:#1c1a17; margin-top:30px; margin-bottom:6px;\">{{ block.text }}<\u002Fh2>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ block.isP }}\" hint-placeholder-val=\"{{ true }}\">\n            <p style=\"font-family:'Newsreader',serif; font-size:19px; line-height:1.74; color:#33302a; margin-bottom:12px;\">{{ block.text }}<\u002Fp>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ block.isQuote }}\" hint-placeholder-val=\"{{ false }}\">\n            <blockquote style=\"font-family:'DM Serif Display',serif; font-style:italic; font-size:25px; line-height:1.32; color:#1c1a17; border-left:3px solid var(--accent,#2f9d5b); padding:6px 0 6px 24px; margin:20px 0;\">{{ block.text }}<\u002Fblockquote>\n          <\u002Fsc-if>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:56px; padding-top:40px; border-top:1px solid #d2c9b7; text-align:center;\">\n        <p style=\"font-family:'DM Serif Display',serif; font-size:24px; color:#1c1a17;\">Gostou desta edição?<\u002Fp>\n        <p style=\"font-family:'Newsreader',serif; font-size:16px; color:#6f665a; margin-top:8px;\">Receba a próxima na sua caixa, toda quinta-feira.<\u002Fp>\n        <button onclick=\"{{ goAssinar }}\" style=\"margin-top:24px; background:var(--accent,#2f9d5b); color:#fff; border:none; cursor:pointer; font-family:'Archivo',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.12em; padding:15px 28px;\">ASSINAR GRÁTIS<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <section style=\"padding:40px 32px 80px;\">\n      <div style=\"max-width:680px; margin:0 auto;\">\n        <p style=\"font-size:11px; letter-spacing:0.26em; color:#8a8071; margin-bottom:24px;\">OUTRAS EDIÇÕES<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:0;\">\n          <sc-for list=\"{{ editions }}\" as=\"ed\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ ed.open }}\" style=\"text-align:left; cursor:pointer; background:none; border:none; border-top:1px solid #d2c9b7; padding:20px 0; display:flex; gap:18px; align-items:center;\">\n              <span style=\"font-size:11px; font-weight:700; letter-spacing:0.08em; color:#8a8071; min-width:48px;\">{{ ed.label }}<\u002Fspan>\n              <span style=\"font-family:'Newsreader',serif; font-size:17px; line-height:1.35; color:#1c1a17; flex:1;\">{{ ed.cardTitle }}<\u002Fspan>\n              <span style=\"font-size:14px; color:#8a8071;\">→<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#161616; color:#8a8071; padding:56px 32px;\">\n    <div style=\"max-width:1000px; margin:0 auto; display:flex; flex-wrap:wrap; gap:24px; align-items:center; justify-content:space-between;\">\n      <div>\n        <span style=\"font-family:'DM Serif Display',serif; font-size:20px; letter-spacing:0.04em; color:#efe8da;\">O LOBO<\u002Fspan>\n        <p style=\"font-size:11px; letter-spacing:0.06em; margin-top:8px;\">© 2026 O Lobo Investimentos. Não é recomendação de investimento.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:28px; font-size:11px; letter-spacing:0.12em;\">\n        <button onclick=\"{{ goEdicoes }}\" style=\"background:none; border:none; cursor:pointer; color:#8a8071; letter-spacing:0.12em; font-family:'Archivo',sans-serif; font-size:11px;\">EDIÇÕES<\u002Fbutton>\n        <button onclick=\"{{ goSobre }}\" style=\"background:none; border:none; cursor:pointer; color:#8a8071; letter-spacing:0.12em; font-family:'Archivo',sans-serif; font-size:11px;\">SOBRE<\u002Fbutton>\n        <button onclick=\"{{ goAssinar }}\" style=\"background:none; border:none; cursor:pointer; color:#8a8071; letter-spacing:0.12em; font-family:'Archivo',sans-serif; font-size:11px;\">ASSINAR<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2f9d5b&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Aparência&quot;},&quot;subscriberCount&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5000,&quot;min&quot;:100,&quot;max&quot;:100000,&quot;step&quot;:100,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Conteúdo&quot;},&quot;editionsLayout&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;grid&quot;,&quot;list&quot;],&quot;default&quot;:&quot;grid&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Aparência&quot;},&quot;showSocialProof&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Conteúdo&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: 'home', selectedId: null, email: '', subscribed: false };\n\n  rawEditions() {\n    return [\n      {\n        id: 3, label: '#003', date: '26 JUN 2025', read: '4 MIN',\n        title: 'O Fed fez o que sempre faz quando não sabe o que fazer: reuniu 12 pessoas sérias pra não decidir nada. A Intel subiu 10%.',\n        cardTitle: 'O Fed fez o que sempre faz quando não sabe o que fazer: reuniu 12 pessoas sérias pra não decidir nada. A Intel subiu 10%…',\n        excerpt: 'A reunião do Fed terminou exatamente como o mercado esperava — em cima do muro. Mas o detalhe que ninguém comentou mudou tudo.',\n        body: [\n          ['p', 'Quinta-feira de novo. Café na mão? Então vamos, porque essa semana o mercado americano resolveu ser dramático.'],\n          ['p', 'O Federal Reserve — o banco central americano, pros íntimos — se reuniu por dois dias para decidir o que fazer com os juros. E decidiu não fazer nada. De novo. Manteve a taxa exatamente onde estava.'],\n          ['h', 'O que realmente aconteceu'],\n          ['p', 'Manter os juros parados não é \"não fazer nada\". É uma decisão. O Fed está num impasse clássico: se cortar os juros, corre o risco de reacender a inflação; se subir, estrangula a economia. Então escolheu a opção mais política de todas — esperar e ver.'],\n          ['p', 'O recado nas entrelinhas foi o que moveu o mercado: o presidente do Fed sinalizou que dois cortes ainda são possíveis até o fim do ano. Tradução de Wall Street: dinheiro mais barato chegando. As bolsas comemoraram.'],\n          ['quote', 'O mercado não reage ao que o Fed faz. Reage ao que ele deixa escapar que vai fazer.'],\n          ['h', 'A empresa da semana — Intel'],\n          ['p', 'A Intel, a velha rainha dos chips, subiu mais de 10% num único dia. O motivo? Rumores de um aporte pesado para reerguer suas fábricas nos EUA. Depois de anos apanhando da Nvidia e da AMD, a gigante adormecida deu sinal de vida.'],\n          ['p', 'Cuidado com a empolgação: um salto de 10% num papel que caiu 60% nos últimos anos ainda é um papel que caiu muito. Mas é o tipo de virada que vale ficar de olho.'],\n          ['h', 'O conceito da semana — \"taxa de juros\"'],\n          ['p', 'Imagine que o dinheiro tem um preço, como qualquer outra coisa. A taxa de juros é esse preço. Quando ela sobe, pegar dinheiro emprestado fica caro, todo mundo gasta menos e a economia esfria. Quando cai, o dinheiro fica barato, todo mundo investe e a economia esquenta. O Fed mexe nesse botão pra controlar a temperatura. Só isso.'],\n          ['p', 'É isso por essa semana. Repassa pra aquele amigo que ainda acha que \"Fed\" é nome de banda. Até quinta. — O Lobo'],\n        ],\n      },\n      {\n        id: 2, label: '#002', date: '19 JUN 2025', read: '5 MIN',\n        title: 'A Nvidia virou a empresa mais valiosa do mundo e todo mundo fingiu que não foi uma coisa maluca de acontecer.',\n        cardTitle: 'A Nvidia virou a empresa mais valiosa do mundo e todo mundo fingiu que não foi uma coisa maluca de acontecer…',\n        excerpt: 'Uma fabricante de placas de vídeo passou Apple e Microsoft e ninguém piscou. A gente piscou — e foi entender por quê.',\n        body: [\n          ['p', 'Aconteceu de novo, e dessa vez de forma definitiva: a Nvidia é, oficialmente, a empresa mais valiosa do planeta. Passou Apple e Microsoft.'],\n          ['h', 'Espera, a Nvidia não faz placa de vídeo de videogame?'],\n          ['p', 'Fazia. Hoje ela faz os \"cérebros\" que treinam toda a inteligência artificial do mundo. Cada vez que você usa um chatbot, tem um chip da Nvidia suando lá atrás. Eles viraram a picareta da nova corrida do ouro — e quem vende picareta sempre ganha, independente de quem acha ouro.'],\n          ['quote', 'Numa corrida do ouro, não aposte nos garimpeiros. Aposte em quem vende as pás.'],\n          ['h', 'O número que assusta'],\n          ['p', 'A empresa vale mais que o PIB de quase todos os países do mundo. É muito dinheiro depositado numa aposta só: a de que a IA vai continuar crescendo no ritmo atual. Se esse ritmo desacelerar, a queda pode ser feia.'],\n          ['h', 'O conceito da semana — \"valor de mercado\"'],\n          ['p', 'É simples: pegue o preço de uma ação e multiplique pelo número total de ações. Pronto, esse é o valor de mercado da empresa. Não é quanto ela tem no banco — é quanto o mercado acha que ela vale. E o mercado, vale lembrar, muda de ideia o tempo todo.'],\n          ['p', 'Até quinta. — O Lobo'],\n        ],\n      },\n      {\n        id: 1, label: '#001', date: '12 JUN 2025', read: '3 MIN',\n        title: 'Bem-vindo ao O Lobo. Vamos começar pelo começo: por que Wall Street parece feita pra você não entender.',\n        cardTitle: 'Bem-vindo ao O Lobo. Vamos começar pelo começo: por que Wall Street parece feita pra você não entender…',\n        excerpt: 'Primeira edição. Sem gráfico complicado, sem promessa de ficar rico. Só uma conversa honesta sobre dinheiro e mercado.',\n        body: [\n          ['p', 'Se você está lendo isto, é a primeira edição de muitas. Então deixa eu ser honesto logo de cara sobre o que isto é — e o que não é.'],\n          ['h', 'O que isto não é'],\n          ['p', 'Não é dica de ação pra ficar rico. Não é grupo de Telegram com seta verde apontando pro céu. Não é curso de mil reais. Se você procura isso, fecha aqui sem ressentimento.'],\n          ['h', 'O que isto é'],\n          ['p', 'É uma carta semanal que pega o que aconteceu de mais importante no mercado americano e explica em português de gente. Toda quinta-feira, de graça, na sua caixa de entrada.'],\n          ['quote', 'O mercado financeiro não é complicado por acaso. Ele é complicado de propósito, porque confusão é um ótimo negócio pra quem cobra pra te desconfundir.'],\n          ['p', 'A boa notícia é que os conceitos que importam cabem num guardanapo. Juros, inflação, valor de mercado, lucro. Quatro ou cinco ideias que, depois de entendidas, nunca mais saem da sua cabeça.'],\n          ['p', 'É esse o trato: toda semana, mais um pedaço de Wall Street deixa de ser um mistério pra você. Bora? — O Lobo'],\n        ],\n      },\n    ];\n  }\n\n  decorate(raw) {\n    const open = () => this.openEdition(raw.id);\n    const body = raw.body.map(([t, text]) => ({\n      isH: t === 'h', isP: t === 'p', isQuote: t === 'quote', text,\n    }));\n    return Object.assign({}, raw, { open, body });\n  }\n\n  scrollToId(id) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    const y = el.getBoundingClientRect().top + window.scrollY - 76;\n    window.scrollTo({ top: y, behavior: 'smooth' });\n  }\n\n  navTo(id) {\n    if (this.state.view !== 'home') {\n      this.setState({ view: 'home', selectedId: null });\n      setTimeout(() => this.scrollToId(id), 60);\n    } else {\n      this.scrollToId(id);\n    }\n  }\n\n  goHome = () => { this.setState({ view: 'home', selectedId: null }); window.scrollTo({ top: 0, behavior: 'smooth' }); };\n  goEdicoes = () => this.navTo('edicoes');\n  goSobre = () => this.navTo('sobre');\n  goAssinar = () => this.navTo('assinar');\n\n  openEdition(id) {\n    this.setState({ view: 'reading', selectedId: id });\n    window.scrollTo({ top: 0, behavior: 'auto' });\n  }\n  openLatest = () => this.openEdition(this.rawEditions()[0].id);\n\n  setEmail = (e) => this.setState({ email: e.target.value });\n  subscribe = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    if (/\\S+@\\S+\\.\\S+/.test(this.state.email)) this.setState({ subscribed: true });\n    else this.setState({ subscribed: true });\n  };\n\n  renderVals() {\n    const editions = this.rawEditions().map((r) => this.decorate(r));\n    const latest = editions[0];\n    const selected = editions.find((e) => e.id === this.state.selectedId) || null;\n    const count = this.props.subscriberCount ?? 5000;\n    const subCountLabel = count >= 1000 ? (count / 1000).toLocaleString('pt-BR') + '.000' : String(count);\n    const layout = this.props.editionsLayout ?? 'grid';\n    const gridStyle = layout === 'list'\n      ? 'display:flex; flex-direction:column; gap:0;'\n      : 'display:grid; grid-template-columns:repeat(2,1fr); gap:20px;';\n    return {\n      accent: this.props.accentColor ?? '#2f9d5b',\n      editions, latest, selected,\n      currentLabel: latest.label,\n      isHome: this.state.view === 'home',\n      isReading: this.state.view === 'reading' && !!selected,\n      subscribed: this.state.subscribed,\n      notSubscribed: !this.state.subscribed,\n      email: this.state.email,\n      showSocialProof: this.props.showSocialProof ?? true,\n      subCountLabel,\n      gridStyle,\n      editionCountLabel: editions.length + ' EDIÇÕES',\n      goHome: this.goHome, goEdicoes: this.goEdicoes, goSobre: this.goSobre, goAssinar: this.goAssinar,\n      openLatest: this.openLatest, setEmail: this.setEmail, subscribe: this.subscribe,\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
